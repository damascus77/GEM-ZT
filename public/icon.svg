<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GEM-ZT">
  <!-- Full-bleed brand background so the icon works as maskable (safe zone ~80%). -->
  <rect width="512" height="512" fill="#1b1938" />
  <!-- Wireframe diamond "ZT" mark (DESIGN.md Application Shell logo), scaled from the 24px viewBox. -->
  <g transform="translate(256,256) scale(14) translate(-12,-12)">
    <polygon
      points="12,2.5 21.5,12 12,21.5 2.5,12"
      fill="none"
      stroke="#c9b4fa"
      stroke-width="1.4"
      stroke-linejoin="round"
    />
    <text
      x="12"
      y="12"
      text-anchor="middle"
      dominant-baseline="central"
      font-size="7.5"
      font-weight="700"
      font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
      fill="#c9b4fa"
    >ZT</text>
  </g>
</svg>
